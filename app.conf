server {
    domains: "lstv.{space, localhost}", "{do1l878my2ui3,d1yn3usvpqkzy5}.{cloudfront.net, lstv.space}";
    canonical: "lstv.space";
    root: /static;

    redirect_https;
    redirect_www;
}

# The version of LS used throughout the site
ls { version: "5.2.9" }

# If beta or development mode we override
# This should ideally be tied to the actual version
case_override (basename['lstv-web-beta', 'lstv-web-dev']) {
    server {
        domains: localhost, "beta.lstv.{space, localhost}", lstv.localhost;
        canonical: "beta.lstv.space";
        root: /static;

        redirect_https;
        redirect_www;
    }

    ls { version: "alpha" }
}

case_override (basename['lstv-web', 'lstv-web-dev']) {
    # Temporary solution
    addon("~/backend");
}

location (
    "/robots.txt",
    "/sitemap.xml",
    "/assets/**",
    "/apps/**"
) alias: "/~{{url}}";

location (/favicon.ico) alias: "~/assets/image/favicon.svg";
# location ("/home/{account, profile, apps, dev, sub-users, bots, keys, api, support}") alias: "/home/index.html";

location ("/app/*") alias: "/app/index.html";

location ("/home/!{index.html, index.css, index.js}") alias: "/home/index.html";
location ("/home/applications/{*,*/details,*/store,*/team,*/delete}") alias: "/home/index.html";

location ("/post/!{index.html, index.css, index.js}") alias: "/post/index.html";
location ("/chat/{,user/*,community/*,community/*/*}") alias: "/chat/index.html";

location ("/sign-up") alias: "/login"; # They are the same page
location ("/{pp, privacy}") alias: "/privacy-policy";
location ("/{terms, terms-of-service}") alias: "/tos";

location ("/~/backend/**") deny;

location ("/check-in") reroute: "api.extragon.cloud/v1/session";

# Old reroute syntax
# case_override (akeno_version['1.6.8<='], akeno_legacy) {
#     handle (/check-in) {
#         as: "api.extragon.cloud";
#         path: /v1/session;
#     }
# }

errors 404: /errors/404.html;

# Redirect for Discord
redirect(/discord) to: "https://discord.gg/jQm9yGKCEC";

# ratelimit limit: 5000;

constants {
    kernel-version: "1.2.5-beta";
}

scss enabled;

postcss {
    enabled;
    extensions: autoprefixer;

    # Scopes CSS files to their folder, that is to avoid conflicts when multiple unsandboxed pages are visible in the same root.
    # Inside you can use :root to refer to the page.
    scoped: to-file;
    scope-exclude: "assets";
}

esbuild {
    targets: "chrome108", "firefox102", "safari16";
}

# Minimum browser version required
browserSupport {
    chrome: 108;
    firefox: 102;
}

preload ("/", "/~/assets/js/kernel.js");