#template /templates/main.html

<head>
    <!-- @use(hljs[lang:javascript]); -->
</head>

<div .container-content .docs-container>
    <div .docs-navbar>
        <button .sidebar-menu-button .clear .square aria-label="Open settings menu">
            <i .bi-list></i>
        </button>
    </div>

    <div .docs-wrapper>
        <template::content />
    </div>
</div>

<style>
.docs-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    max-width: 1600px;
    margin: auto;
    min-height: 0;
}

.docs-wrapper {
    display: flex;
    flex-direction: row;
    width: 100%;
    height: 100%;
    min-height: 0;
    flex: 1;
}

.docs-navbar {
    height: 40px;
    background: var(--elevate-n1);
    border-bottom: 1px solid var(--surface-0);
    box-shadow: 0 -5px 18px 0 #0001;
    z-index: 500;
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 0 10px;
    width: 100%;
    overflow-x: auto;

    .navbar-link {
        padding: 2px 8px;
        border-radius: var(--border-radius);
        transition: background-color .1s;
    }
    
    .navbar-link:hover {
        background: var(--elevate);
    }
}

.docs-sidebar {
    overflow-y: auto;
    overflow-x: hidden;
    width: 100%;
}

.docs-content {
    padding: 20px 100px;
    padding-bottom: 80px;
    overflow-y: auto;
    overflow-x: hidden;
    height: 100%;
    width: 100%;
    user-select: text;
    min-width: 0;
    flex: 1;

    --font: "Mona Sans VF",-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
    font-family: var(--font);

    pre {
        white-space: pre;
        display: block;
        background: var(--elevate-0);
        padding: 14px;
        border-radius: var(--border-radius-large);
        outline: 1px solid var(--elevate);
        position: relative;
        overflow-x: auto;
    }

    code {
        font-family: "JetBrains Mono", monospace !important;
    }

    code.inline {
        background: var(--elevate);
        display: inline-block;
        padding: 0 6px;
        border-radius: var(--border-radius);
        outline: 1px solid var(--elevate-1);
    }

    .copy-button {
        position: absolute !important;
        top: 10px;
        right: 10px;
        opacity: 0.6;
        transition: opacity 0.2s ease-in-out;

        &:hover {
            opacity: 1;
        }
    }

    h1, h2, h3, h4, h5, h6 {
        font-family: var(--font);
        position: relative;
        margin-top: 28px;

        .anchor-link {
            opacity: 0;
            margin-left: 8px;
            transition: opacity 0.2s ease-in-out;
            position: absolute;
            right: calc(100% + 10px);
            top: 50%;
            transform: translateY(-50%);
        }

        &:hover .anchor-link {
            opacity: 1;
        }
    }

    h1:not(:first-of-type), h2, h3, h4 {
        margin-top: 58px;
    }

    h1, h2, h3 {
        margin-bottom: 14px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--elevate-1);
    }

    .blockquote-lead {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
    }

    blockquote {
        padding: 14px;
        padding-left: 28px;
        margin-left: 0;
        margin-right: 0;
        margin-top: 16px;
        margin-bottom: 16px;
        border-radius: var(--border-radius-large);
        background-color: var(--elevate-0);
        position: relative;
    }

    blockquote::after {
        content: "";
        border-left: 6px solid var(--accent);
        position: absolute;
        border-radius: 100px;
        left: 10px;
        top: 12px;
        bottom: 12px;
    }

    img {
        max-width: 100%;
        height: auto;
    }

    li {
        margin: 6px 0;
    }
}

@media (max-width: 768px) {
    .docs-content {
        padding: 20px;
    }

    .anchor-link {
        right: 10px !important;
    }
}


ul.tree, .subtree ul {
    padding-left: 15px;
}

.node {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    border-radius: var(--border-radius);
    cursor: pointer;
    user-select: none;
    transition: background-color .1s;

    &:hover {
        background: var(--elevate);
    }

    &.active {
        background: var(--elevate-2);

    }

    .toggle {
        color: var(--color);
    }
}

span.node-badge {
    float: right;
    display: inline-block;
    background: var(--elevate-2);
    border-radius: var(--border-radius-full);
    padding: 0 8px;
    font-size: small;
}

ul.tree {
  list-style: none;
  padding: 0;
}

/* indent + vertical guide rail */
ul.tree ul {
  padding-left: 20px;
  position: relative;
}

ul.tree ul::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 4px;
  bottom: 10px;
  width: 1px;
  background: var(--elevate-2);
}

.tree li {
  position: relative;
  padding: 0;
}

.tree li + li { margin-top: 1px; }

/* horizontal tick to each child */
ul.tree ul > li::before {
  content: '';
  position: absolute;
  left: -12px;
  top: 14px;
  width: 12px;
  height: 1px;
  background: var(--elevate-2);
}

.toggle {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--surface-n2);
  transition: transform .15s ease, color .12s;
  font-size: 10px;
}

.toggle.open  { transform: rotate(90deg); }
.toggle.leaf  { opacity: 0; pointer-events: none; }

.subtree {
  overflow: hidden;
  transition: height .18s ease;
}

.node-name {
  font-size: 13px;
  color: var(--color);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.subtree.collapsed { height: 0 !important; }
.node--header .node-name { font-size: 12px; }
.node--deep               { padding-left: 8px; }
</style>

<script>
    website.register(document.currentScript, class extends LS.Context {
        constructor(context, container) {
            super();
            this.context = context;
            this.container = container;

            container.querySelector('.sidebar-menu-button').addEventListener('click', () => {
                container.classList.toggle('sidebar-menu-visible');
            });

            const sidebar = container.querySelector('.docs-sidebar') || LS.Create('div.docs-sidebar').addTo(container.querySelector(".docs-wrapper"), 0);
            if(sidebar) {
                sidebar.classList.add('sidebar-menu');
                sidebar.classList.add('sidebar-items');
                sidebar.classList.add('level-n2');
                
                LS.Resize.set(sidebar, {
                    sides: [0, 1, 0, 0],
                    snapHorizontal: true
                });
            }

            const contentContainer = container.querySelector('.docs-content');
            if(contentContainer) {
                contentContainer.classList.add('sidebar-content');
                contentContainer.classList.add('level-n1');
            }

            container.querySelectorAll('code').forEach((code) => {
                if(code.parentElement?.tagName.toLowerCase() === 'pre') return;
                code.classList.add('inline');
            });

            container.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach((heading) => {
                const id = heading.id || heading.textContent.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '');
                heading.id = id;
                heading.appendChild(LS.Create('a.anchor-link[aria-label="Link to this heading"]', {
                    href: `#${id}`,
                    inner: { tag: 'i', class: 'bi-link-45deg' },
                }));
            });

            container.querySelectorAll('pre').forEach((pre) => {
                pre.appendChild(LS.Create('button.copy-button.clear.square>i.bi-clipboard', {
                    ariaLabel: 'Copy code to clipboard',
                    tooltip: 'Copy',
                    onclick: () => {
                        LS.Util.copy(pre.innerText);
                        LS.Toast.show('Code copied to clipboard', {
                            accent: "green",
                            timeout: 2000
                        });
                    },
                }));
            });

            const bqs = {
                "NOTE": ["bi-info-circle", "blue"],
                "WARNING": ["bi-exclamation-triangle", "orange"],
                "TIP": ["bi-lightbulb", "green"],
                "IMPORTANT": ["bi-exclamation-diamond", "red"],
                "TERMINAL": ["terminal-fill", "purple"],
            };

            container.querySelectorAll('blockquote').forEach((bq) => {
                // GitHub-style blockquotes
                const leadText = bq?.firstChild?.textContent?.trim?.().toUpperCase?.();
                if(!leadText || !leadText.startsWith('[!')) return;

                const label = leadText.slice(2, -1);
                const iconInfo = bqs[label];

                bq.setAttribute('ls-accent', iconInfo ? iconInfo[1] : 'blue');

                bq.firstChild.replaceWith(LS.Create('div.blockquote-lead', [
                    LS.Create(`i.${iconInfo[0]}`),
                    label[0].toUpperCase() + label.slice(1).toLowerCase(),
                ]));
            });

            // Build the navbar
            const navbar = container.querySelector('.docs-navbar');
            if(navbar) {
                let i = 0;
                const pathParts = window.location.pathname.split('/').filter(Boolean);
                for(const part of pathParts) {
                    i++;
                    if(i === 1) continue;
                    
                    const link = LS.Create('a.navbar-link', {
                        href: '/' + pathParts.slice(0, i).join('/'),
                        textContent: part,
                    });

                    navbar.appendChild(link);
                }
            }


            // Sidebar
            const sidebarData = container.querySelector('#docs-sidebar')?.textContent;
            if(sidebarData) {
                try {
                    const sidebarJson = JSON.parse(sidebarData);
                    const sidebar = container.querySelector('.docs-sidebar');
                    if(sidebar) {
                        // new DocsSidebar(sidebar, sidebarJson['docs-sidebar'], {
                        //     basePath: '/docs/ls',
                        //     scrollContainer: container.querySelector('.docs-content'),
                        //     headerLevels: [2, 3],
                        // });
                        // TODO: Render sidebar
                    }
                } catch(e) {
                    console.error('Failed to parse sidebar JSON:', e);
                }
            }

            // TODO: Load a map & add content search

            // Normally this is done at compilation time, but we can call this if available anyway
            if(window.hljs) setTimeout(() => {
                hljs.highlightAll();
            }, 0);
        }
    });

</script>
