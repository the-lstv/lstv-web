#template /templates/main.html

<head>
    @use(hljs[lang:javascript,lang:html]);
</head>

<div .container-content .docs-container>
    <button .sidebar-menu-button .clear .square aria-label="Open settings menu">
        <i .bi-list></i>
    </button>

    <template::content />
</div>

<style>
.docs-container {
    display: flex;
    flex-direction: row;
    width: 100%;
    height: 100%;
    max-width: 1800px;
    margin: auto;
}

.docs-sidebar {
    overflow-y: auto;
    overflow-x: hidden;
    width: 100%;

    details summary::-webkit-details-marker,
    details summary::marker {
        display: none; 
        content: "";
    }

    details summary:after {
        content: "▸";
        float: right;
        transition: transform 0.2s ease-in-out;
    }
}

.docs-content {
    padding: 20px;
    overflow-y: auto;
    overflow-x: hidden;
    height: 100%;
    width: 100%;

    pre {
        white-space: pre-wrap;
        display: block;
        background: var(--elevate-0);
        padding: 14px;
        border-radius: var(--border-radius-large);
        outline: 1px solid var(--elevate);
        position: relative;
        user-select: text;
    }

    code {
        font-family: "JetBrains Mono", monospace !important;
    }

    .copy-button {
        position: absolute !important;
        top: 10px;
        right: 10px;
        opacity: 0.6;
        transition: opacity 0.2s ease-in-out;

        &:hover {
            opacity: 1;
        }
    }
}

/* Keywords / important syntax */
.hljs-keyword,
.hljs-selector-tag,
.hljs-built_in {
    color: #e777f7;
}

/* Strings */
.hljs-string {
    color: #9ece6a;
}

/* Numbers / literals */
.hljs-number,
.hljs-literal, .hljs-subst {
    color: #7dcfff;
}

/* Types / titles */
.hljs-title,
.hljs-type, .hljs-name {
    color: #f7768e;
}

/* Functions / variables */
.hljs-attr {
    color: #ff9409;
}

/* Symbols / operators */
.hljs-symbol,
.hljs-operator {
    color: #09d6ff;
}

/* Comments */
.hljs-comment {
    color: var(--surface-6);
}

[ls-theme="light"] {
    .hljs-keyword,
    .hljs-selector-tag,
    .hljs-built_in {
        color: #7c4dff;
    }

    .hljs-string {
        color: #43a047;
    }

    .hljs-number,
    .hljs-literal, .hljs-subst {
        color: #039be5;
    }

    .hljs-title,
    .hljs-type, .hljs-name {
        color: #e91e63;
    }

    .hljs-attr {
        color: #ff5722;
    }

    .hljs-symbol,
    .hljs-operator {
        color: #00bcd4;
    }
}
</style>

<script>
    website.register(document.currentScript, class extends LS.Context {
        constructor(context, container) {
            super();
            this.context = context;
            this.container = container;

            container.querySelector('.sidebar-menu-button').addEventListener('click', () => {
                container.classList.toggle('sidebar-menu-visible');
            });

            const sidebar = container.querySelector('.docs-sidebar') || LS.Create('div.docs-sidebar').addTo(container.querySelector(".container-content"), 0);
            if(sidebar) {
                sidebar.classList.add('sidebar-menu');
                sidebar.classList.add('sidebar-items');
                sidebar.classList.add('level-n1');
    
                LS.Resize.set(sidebar, {
                    sides: [0, 1, 0, 0],
                    snapHorizontal: true,
                });
            }

            const contentContainer = container.querySelector('.docs-content');
            if(contentContainer) {
                contentContainer.classList.add('sidebar-content');
            }

            container.querySelectorAll('pre').forEach((pre) => {
                pre.appendChild(LS.Create('button.copy-button.clear.square>i.bi-clipboard', {
                    ariaLabel: 'Copy code to clipboard',
                    tooltip: 'Copy',
                    onclick: () => {
                        LS.Util.copy(pre.innerText);
                        LS.Toast.show('Code copied to clipboard', {
                            accent: "green",
                            timeout: 2000
                        });
                    },
                }));
            });

            // TODO: Sometime do this at compile time perhaps maybe idk
            hljs.highlightAll();
        }
    });
</script>
